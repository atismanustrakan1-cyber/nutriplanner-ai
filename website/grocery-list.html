<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grocery List — NutriPlanner AI</title>
  <meta name="description" content="View your imported weekly grocery list from AI Meal Plan." />
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="grocery-list-page">
  <button type="button" class="sidebar-menu-btn" id="sidebarMenuBtn" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">
    <span class="sidebar-menu-icon" aria-hidden="true"></span>
  </button>
  <div class="sidebar-backdrop" id="sidebarBackdrop" hidden aria-hidden="true"></div>
  <div class="top-auth-bar" aria-label="Account">
    <a href="login.html" id="navAuthLink" class="btn ghost small top-auth-login">Log in</a>
    <span id="navAuthUser" class="nav-auth-user top-auth-user" hidden></span>
  </div>
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-inner">
      <a href="index.html" class="sidebar-brand">
        <img src="logo.png" alt="" class="logo" width="44" height="44" />
        <div class="sidebar-brand-text">
          <div class="title">MealTracker</div>
          <div class="subtitle">Hack@UCF</div>
        </div>
      </a>
      <nav class="nav sidebar-nav" id="nav">
        <a href="index.html">Home</a>
        <a href="targets.html">Set Targets</a>
        <a href="daylog.html">Day Log</a>
        <a href="weekly-planner.html">Weekly Planner</a>
        <a href="grocery-list.html">Grocery List</a>
        <a href="meal-plan.html">AI Meal Plan</a>
        <a href="settings.html">Settings</a>
        <span id="userGreeting" class="user-greeting"></span>
        <a class="btn" href="https://github.com/atismanustrakan1-cyber/nutriplanner-ai" target="_blank" rel="noreferrer">GitHub</a>
        <button type="button" id="navAuthSignOut" class="btn ghost small sidebar-sign-out" hidden>Sign out</button>
      </nav>
    </div>
  </aside>

  <div class="app-content">
  <main class="page-main">
    <div class="container">
      <header class="page-header">
        <h1>Grocery List</h1>
        <p class="lead muted">Imported from your latest AI Meal Plan.</p>
      </header>
      <section class="card grocery-list-card">
        <div class="grocery-list-toolbar">
          <div class="grocery-list-toolbar-actions">
            <a class="btn ghost" href="meal-plan.html">Back to AI Meal Plan</a>
            <button type="button" class="btn ghost small grocery-clear-btn" id="groceryClearBtn">Clear list</button>
          </div>
          <span id="groceryStatus" class="muted" aria-live="polite"></span>
        </div>
        <div class="grocery-list-form">
          <label>Item
            <input type="text" id="groceryItemInput" placeholder="e.g. Chicken breast" maxlength="120" />
          </label>
          <label>Quantity
            <input type="text" id="groceryQtyInput" placeholder="e.g. 2" maxlength="6" inputmode="numeric" pattern="[0-9]*" />
          </label>
          <label>Location
            <input type="text" id="groceryWhereInput" placeholder="e.g. Kroger · https://maps..." maxlength="220" />
          </label>
          <button type="button" class="btn primary grocery-add-btn" id="groceryAddBtn">Add item</button>
        </div>
        <div id="groceryListRoot" class="meal-plan-grocery-list"></div>
      </section>
    </div>
  </main>
  </div>

  <script src="nutriplanner.js"></script>
  <script src="auth-config.js"></script>
  <script type="module" src="auth.js"></script>
  <script src="nav.js"></script>
  <script src="script.js"></script>
  <script src="settings.js"></script>
  <script src="grocery-list.js"></script>
</body>
</html>
